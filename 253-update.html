    body {

      height: 100vh;
      color: #333;
    }

    #chat {
      flex: 1;
      padding: 20px;
      max-width: 700px;
      width: 100%;
      margin: 0 auto;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
    }

    #notice {
      background-color: #fff3cd;
      color: #856404;
      border: 1px solid #ffeeba;
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 0.95em;
    }

    #status {
      text-align: center;
      padding: 6px;
      font-size: 0.85em;
      color: #888;
    }
    #status.connected { color: #28a745; }
    #status.error { color: #dc3545; }

    .message {
      margin: 10px 0;
      padding: 12px 16px;
      border-radius: 20px;
      max-width: 80%;
      word-wrap: break-word;
      animation: fadeIn 0.3s ease-in-out;
      line-height: 1.5;
    }

    .user {
      align-self: flex-end;
      background-color: #d0ebff;
      color: #004085;
      text-align: right;
    }

    .bot {
      align-self: flex-start;
      background-color: #d4edda;
      color: #155724;
      text-align: left;
    }

    .bot pre {
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 12px;
      border-radius: 10px;
      overflow-x: auto;
      font-family: Consolas, Monaco, monospace;
      margin-top: 10px;
    }

    .bot code {
      white-space: pre-wrap;
    }

    #form {
      display: flex;
      justify-content: center;
      padding: 15px;
      border-top: 1px solid #ccc;
      background: #fff;
      max-width: 700px;
      width: 100%;
      margin: 0 auto;
      box-sizing: border-box;
    }

    #input {
      flex: 1;
      padding: 12px 16px;
      font-size: 1em;
      border: 1px solid #ccc;
      border-radius: 20px;
      outline: none;
      transition: border-color 0.3s;
    }

    #input:focus {
      border-color: #66afe9;
    }

    #send {
      padding: 12px 20px;
      margin-left: 10px;
      font-size: 1em;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    #send:hover {
      background-color: #0056b3;
    }

    #send:disabled {
      background-color: #aaa;
      cursor: not-allowed;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
