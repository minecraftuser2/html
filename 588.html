    <style>
      body,
      html {
        background-color: #000000;
        image-rendering: pixelated;
        scrollbar-width: none;
      }
      ::-webkit-scrollbar {
        display: none;
      }
      canvas {
        width: 100vw;
        height: 100vh;
      }

      /* --- Controller Toggle Button --- */
      #toggle-controls-btn {
        position: fixed;
        top: 10px;
        left: 10px;
        z-index: 9999;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        border: 1px solid #fff;
        border-radius: 8px;
        font-size: 1.5rem;
        padding: 6px 10px;
        cursor: pointer;
        transition: background 0.2s;
      }

      #toggle-controls-btn:hover {
        background: rgba(255, 255, 255, 0.15);
      }

      /* Controls container styling */
      #controls {
        background: rgba(0, 0, 0, 0.8);
        border-radius: 12px;
        padding: 20px;
        margin-top: 60px;
      }

    <div class="container text-light" id="controls" hidden>
      <figure>
        <blockquote class="blockquote">
          <h1 class="display-6"><strong>Keyboard Controls</strong></h1>
        </blockquote>
        <figcaption class="blockquote-footer">
          You can use a controller!
        </figcaption>
        <figcaption class="blockquote-footer">
          You can save! Save is stored in local storage.
        </figcaption>
        <figcaption class="blockquote-footer">
          Press page down to hide these instructions.
        </figcaption>
        <figcaption class="blockquote-footer">
          Press page up to see them again.
        </figcaption>

    <script type="text/javascript">
      // Toggle controls visibility
      document
        .getElementById("toggle-controls-btn")
        .addEventListener("click", () => {
          const controls = document.getElementById("controls");
          controls.hidden = !controls.hidden;
        });

      // Emscripten module setup
      var Module = {
        preRun: [],
        postRun: [],
        print: (function () {
          return function (text) {
            if (arguments.length > 1)
              text = Array.prototype.slice.call(arguments).join(" ");
            console.log(text);
          };
        })(),
        printErr: function (text) {
          if (arguments.length > 1)
            text = Array.prototype.slice.call(arguments).join(" ");
          console.error(text);
        },
        canvas: (function () {
          var canvas = document.getElementById("canvas");
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
          canvas.addEventListener(
            "webglcontextlost",
            function (e) {
              alert("WebGL context lost. You will need to reload the page.");
              e.preventDefault();
            },
            false
          );
          return canvas;
        })(),
        setStatus: function (text) {},
      };
    </script>
